global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager-service:9093"]

scrape_configs:
  - job_name: orca-memory-api
    static_configs:
      - targets: ["host.docker.internal:4000"]
    metrics_path: /metrics

  - job_name: orca-worker
    static_configs:
      - targets: ["host.docker.internal:4010"]
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ["telemetry-collector:8889"]
