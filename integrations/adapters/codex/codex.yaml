# Orca Memory — Codex CLI Integration
# Copy or merge into ~/.codex/config.yaml or project-level codex.yaml

mcp_servers:
  orca:
    command: "uv"
    args:
      - "run"
      - "--directory"
      - "../../mcp-server"
      - "python"
      - "server.py"
    transport: "stdio"
    timeout: 30

skills:
  - path: ./orca-memory.md
