name: orca

services:
  memory-api-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/memory-api/Dockerfile
      args:
        WARM_EMBEDDING_MODEL: ${WARM_EMBEDDING_MODEL:-true}
    env_file:
      - path: .env
        required: false
    environment:
      MEMORY_API_PORT: 4000
      REDIS_URL: ${APP_REDIS_URL:-redis://working-memory-cache:6379}
      MEMORY_STATE_BACKEND: ${APP_MEMORY_STATE_BACKEND:-redis}
      MEMORY_STATE_REDIS_KEY: ${APP_MEMORY_STATE_REDIS_KEY:-orca:state:v1}
      WEAVIATE_HTTP_URL: ${APP_WEAVIATE_HTTP_URL:-http://semantic-vector-store:8080}
      NEO4J_URI: ${APP_NEO4J_URI:-bolt://knowledge-graph-store:7687}
      NEO4J_USERNAME: ${APP_NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${APP_NEO4J_PASSWORD:-orca-memory}
      TEMPORAL_ADDRESS: ${APP_TEMPORAL_ADDRESS:-temporal-service:7233}
      TEMPORAL_NAMESPACE: ${APP_TEMPORAL_NAMESPACE:-default}
      TEMPORAL_WORKFLOW_TASK_QUEUE: ${APP_TEMPORAL_WORKFLOW_TASK_QUEUE:-orca-memory-module}
      TEMPORAL_EXECUTION_MODE: ${TEMPORAL_EXECUTION_MODE:-auto}
      TEMPORAL_GRAPH_BACKEND: ${TEMPORAL_GRAPH_BACKEND:-neo4j-temporal}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-transformers}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-onnx-community/Qwen3-Embedding-0.6B-ONNX}
      EMBEDDING_DTYPE: ${EMBEDDING_DTYPE:-q8}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      EMBEDDING_QUERY_INSTRUCTION: ${EMBEDDING_QUERY_INSTRUCTION:-Given an agent memory recall query, retrieve relevant memories that answer or contextualize the query}
      EMBEDDING_CACHE_DIR: ${APP_EMBEDDING_CACHE_DIR:-/app/data/models/transformers}
      RERANKER_MODEL: ${RERANKER_MODEL:-bge-reranker-base}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL:-qwen2.5:14b}
      GRAPHITI_EMBEDDING_MODEL: ${GRAPHITI_EMBEDDING_MODEL:-nomic-embed-text}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${APP_OTEL_EXPORTER_OTLP_ENDPOINT:-http://telemetry-collector:4318}
      MAX_REQUEST_BYTES: ${MAX_REQUEST_BYTES:-1048576}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-10000}
      ORCA_AUTH_MODE: ${ORCA_AUTH_MODE:-api-key}
      ORCA_API_KEY: ${ORCA_API_KEY:-}
      MEMORY_DATA_DIR: /app/data
      MEMORY_DATA_FILE: /app/data/orca-memory-os.json
    depends_on:
      working-memory-cache:
        condition: service_healthy
      semantic-vector-store:
        condition: service_healthy
      knowledge-graph-store:
        condition: service_healthy
      temporal-service:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  memory-workflow-worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      args:
        WARM_EMBEDDING_MODEL: ${WARM_EMBEDDING_MODEL:-true}
    env_file:
      - path: .env
        required: false
    environment:
      WORKER_PORT: 4010
      REDIS_URL: ${APP_REDIS_URL:-redis://working-memory-cache:6379}
      MEMORY_STATE_BACKEND: ${APP_MEMORY_STATE_BACKEND:-redis}
      MEMORY_STATE_REDIS_KEY: ${APP_MEMORY_STATE_REDIS_KEY:-orca:state:v1}
      WEAVIATE_HTTP_URL: ${APP_WEAVIATE_HTTP_URL:-http://semantic-vector-store:8080}
      NEO4J_URI: ${APP_NEO4J_URI:-bolt://knowledge-graph-store:7687}
      NEO4J_USERNAME: ${APP_NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${APP_NEO4J_PASSWORD:-orca-memory}
      TEMPORAL_ADDRESS: ${APP_TEMPORAL_ADDRESS:-temporal-service:7233}
      TEMPORAL_NAMESPACE: ${APP_TEMPORAL_NAMESPACE:-default}
      TEMPORAL_WORKFLOW_TASK_QUEUE: ${APP_TEMPORAL_WORKFLOW_TASK_QUEUE:-orca-memory-module}
      TEMPORAL_EXECUTION_MODE: ${TEMPORAL_EXECUTION_MODE:-auto}
      TEMPORAL_GRAPH_BACKEND: ${TEMPORAL_GRAPH_BACKEND:-neo4j-temporal}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-transformers}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-onnx-community/Qwen3-Embedding-0.6B-ONNX}
      EMBEDDING_DTYPE: ${EMBEDDING_DTYPE:-q8}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      EMBEDDING_QUERY_INSTRUCTION: ${EMBEDDING_QUERY_INSTRUCTION:-Given an agent memory recall query, retrieve relevant memories that answer or contextualize the query}
      EMBEDDING_CACHE_DIR: ${APP_EMBEDDING_CACHE_DIR:-/app/data/models/transformers}
      RERANKER_MODEL: ${RERANKER_MODEL:-bge-reranker-base}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL:-qwen2.5:14b}
      GRAPHITI_EMBEDDING_MODEL: ${GRAPHITI_EMBEDDING_MODEL:-nomic-embed-text}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${APP_OTEL_EXPORTER_OTLP_ENDPOINT:-http://telemetry-collector:4318}
      MAX_REQUEST_BYTES: ${MAX_REQUEST_BYTES:-1048576}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-10000}
      ORCA_AUTH_MODE: ${ORCA_AUTH_MODE:-api-key}
      ORCA_API_KEY: ${ORCA_API_KEY:-}
      MEMORY_DATA_DIR: /app/data
      MEMORY_DATA_FILE: /app/data/orca-memory-os.json
    depends_on:
      working-memory-cache:
        condition: service_healthy
      semantic-vector-store:
        condition: service_healthy
      knowledge-graph-store:
        condition: service_healthy
      temporal-service:
        condition: service_healthy
    ports:
      - "4010:4010"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4010/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  orca-proxy-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/proxy/Dockerfile
      args:
        WARM_EMBEDDING_MODEL: ${WARM_EMBEDDING_MODEL:-false}
    env_file:
      - path: .env
        required: false
    environment:
      ORCA_PROXY_PORT: 4030
      ORCA_BASE_URL: ${APP_ORCA_BASE_URL:-http://memory-api-service:4000}
      ORCA_API_KEY: ${ORCA_API_KEY:-}
      ORCA_REQUIRED: ${ORCA_REQUIRED:-true}
      ORCA_FAILURE_MODE: ${ORCA_FAILURE_MODE:-block}
      ORCA_DEFAULT_SCOPE: ${ORCA_DEFAULT_SCOPE:-workspace}
      ORCA_PROXY_MAX_REQUEST_BYTES: ${ORCA_PROXY_MAX_REQUEST_BYTES:-1048576}
      ORCA_PROXY_MEMORY_BLOCK_MAX_CHARS: ${ORCA_PROXY_MEMORY_BLOCK_MAX_CHARS:-6000}
      ORCA_PROXY_UPSTREAM_BASE_URL: ${ORCA_PROXY_UPSTREAM_BASE_URL:-https://api.openai.com}
      OPENAI_UPSTREAM_BASE_URL: ${OPENAI_UPSTREAM_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      memory-api-service:
        condition: service_healthy
    ports:
      - "4030:4030"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4030/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  working-memory-cache:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  semantic-vector-store:
    image: semitechnologies/weaviate:1.31.2
    hostname: node1
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: "20"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate-data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 15s
      timeout: 10s
      retries: 10

  knowledge-graph-store:
    image: neo4j:5
    command: ["neo4j", "console"]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/orca-memory
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p orca-memory 'RETURN 1;' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  workflow-state-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
      POSTGRES_DB: temporal
    ports:
      - "5433:5432"
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal-service:
    image: temporalio/auto-setup:1.28.0
    depends_on:
      workflow-state-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: workflow-state-postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD-SHELL", "tctl --address $(hostname -i):7233 cluster health"]
      interval: 20s
      timeout: 10s
      retries: 10

  temporal-ui-service:
    image: temporalio/ui:2.39.0
    depends_on:
      temporal-service:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal-service:7233
    ports:
      - "8233:8080"

  telemetry-collector:
    image: otel/opentelemetry-collector-contrib:0.122.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    volumes:
      - ./infra/docker/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro

  metrics-prometheus:
    image: prom/prometheus:v3.4.2
    ports:
      - "9090:9090"
    volumes:
      - ./infra/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  alertmanager-service:
    image: prom/alertmanager:v0.28.1
    ports:
      - "9093:9093"
    volumes:
      - ./infra/docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

  grafana-service:
    image: grafana/grafana:12.1.1
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  redis-data:
  weaviate-data:
  neo4j-data:
  neo4j-logs:
  temporal-postgres-data:
  prometheus-data:
  grafana-data:
