apiVersion: apps/v1
kind: Deployment
metadata:
  name: orca-memory-api
  namespace: orca
  labels:
    app: orca-memory-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orca-memory-api
  template:
    metadata:
      labels:
        app: orca-memory-api
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: memory-api
          image: ghcr.io/orca/orca-memory-api:latest
          ports:
            - name: http
              containerPort: 4000
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: orca-config
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orca-secrets
                  key: neo4j-password
            - name: ORCA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: orca-secrets
                  key: api-key
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: orca-memory-api
  namespace: orca
  labels:
    app: orca-memory-api
spec:
  selector:
    app: orca-memory-api
  ports:
    - name: http
      port: 4000
      targetPort: 4000
