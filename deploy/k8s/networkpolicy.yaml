---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orca-platform-internal
  namespace: orca
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - orca-redis
          - orca-weaviate
          - orca-neo4j
          - orca-temporal
          - orca-temporal-postgresql
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - orca-memory-api
                  - orca-worker
                  - orca-temporal
                  - orca-temporal-postgresql
                  - orca-redis
                  - orca-weaviate
                  - orca-neo4j
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - orca-memory-api
                  - orca-worker
                  - orca-temporal
                  - orca-temporal-postgresql
                  - orca-redis
                  - orca-weaviate
                  - orca-neo4j
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
