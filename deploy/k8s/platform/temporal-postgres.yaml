apiVersion: v1
kind: Service
metadata:
  name: temporal-postgresql
  namespace: orca
spec:
  selector:
    app: orca-temporal-postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orca-temporal-postgresql
  namespace: orca
spec:
  serviceName: temporal-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: orca-temporal-postgresql
  template:
    metadata:
      labels:
        app: orca-temporal-postgresql
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: orca-platform-secrets
                  key: temporal-postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orca-platform-secrets
                  key: temporal-postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: orca-platform-secrets
                  key: temporal-postgres-db
          volumeMounts:
            - name: temporal-postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
  volumeClaimTemplates:
    - metadata:
        name: temporal-postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
