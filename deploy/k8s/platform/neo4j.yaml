apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: orca
spec:
  selector:
    app: orca-neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orca-neo4j
  namespace: orca
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: orca-neo4j
  template:
    metadata:
      labels:
        app: orca-neo4j
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: neo4j
          image: neo4j:5
          ports:
            - containerPort: 7474
            - containerPort: 7687
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orca-platform-secrets
                  key: neo4j-password
            - name: NEO4J_server_memory_heap_initial__size
              value: "512m"
            - name: NEO4J_server_memory_heap_max__size
              value: "512m"
          command:
            - /bin/sh
            - -lc
            - export NEO4J_AUTH="neo4j/${NEO4J_PASSWORD}" && exec neo4j console
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
            - name: neo4j-logs
              mountPath: /logs
          readinessProbe:
            tcpSocket:
              port: 7687
          livenessProbe:
            tcpSocket:
              port: 7687
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
    - metadata:
        name: neo4j-logs
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
