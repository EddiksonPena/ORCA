<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1080" width="1000" height="1080" role="img" aria-labelledby="archTitle archDesc">
  <title id="archTitle">Orca reference architecture</title>
  <desc id="archDesc">Layered planes: interface, API, control, data, execution, and operations.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="caret" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0 10 5 0 10" fill="#94a3b8"/>
    </marker>
    <marker id="caretMuted" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0 8 4 0 8" fill="#475569"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <text x="500" y="46" fill="#f1f5f9" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="26" font-weight="700" text-anchor="middle" letter-spacing="0.06em">ORCA</text>
  <text x="500" y="74" fill="#94a3b8" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="14" font-weight="500" text-anchor="middle">Agentic memory infrastructure</text>

  <g transform="translate(40,94)" filter="url(#shadow)">
    <!-- Interface -->
    <rect x="0" y="0" width="920" height="92" rx="12" ry="12" fill="#2e1065" stroke="#a78bfa" stroke-width="2"/>
    <rect x="0" y="-22" width="160" height="22" rx="4" ry="4" fill="#18181b"/>
    <text x="80" y="-7" fill="#cbd5f5" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.06em">INTERFACE</text>
    <text x="460" y="36" fill="#f5f3ff" font-family="system-ui,sans-serif" font-size="15" font-weight="600" text-anchor="middle">Agent harness � clients</text>
    <text x="460" y="62" fill="#ddd6fe" font-family="system-ui,sans-serif" font-size="12.5" text-anchor="middle">LLMs � applications � tools � MCP clients � custom agents</text>

    <!-- API -->
    <rect x="0" y="118" width="920" height="88" rx="12" ry="12" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
    <rect x="0" y="96" width="124" height="22" rx="4" ry="4" fill="#18181b"/>
    <text x="62" y="111" fill="#cbd5f5" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.06em">API</text>
    <text x="460" y="152" fill="#e0e7ff" font-family="system-ui,sans-serif" font-size="15" font-weight="600" text-anchor="middle">Orca API layer � contract boundary</text>
    <text x="460" y="178" fill="#c7d2fe" font-family="system-ui,sans-serif" font-size="12.5" text-anchor="middle">Ingest � recall � feedback � metrics � JWT / API keys � rate limiting</text>

    <!-- Control plane -->
    <rect x="0" y="246" width="920" height="218" rx="12" ry="12" fill="#431407" stroke="#fb923c" stroke-width="2"/>
    <rect x="0" y="224" width="200" height="22" rx="4" ry="4" fill="#18181b"/>
    <text x="100" y="239" fill="#fdba74" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.06em">CONTROL PLANE</text>
    <!-- 2x2 grid -->
    <rect x="20" y="268" width="430" height="86" rx="8" ry="8" fill="#451a03" stroke="#fdba74" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="235" y="298" fill="#ffedd5" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Ingestion pipeline</text>
    <text x="235" y="320" fill="#fed7aa" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Normalize � chunk � embed � entities &amp; relations � route</text>
    <rect x="470" y="268" width="430" height="86" rx="8" ry="8" fill="#451a03" stroke="#fdba74" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="685" y="298" fill="#ffedd5" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Retrieval orchestrator</text>
    <text x="685" y="320" fill="#fed7aa" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Hybrid search � rerank � context assembly � query planning</text>
    <rect x="20" y="368" width="430" height="86" rx="8" ry="8" fill="#451a03" stroke="#fdba74" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="235" y="398" fill="#ffedd5" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Memory lifecycle engine</text>
    <text x="235" y="420" fill="#fed7aa" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Salience � promotion � summarization � compression � decay policies</text>
    <rect x="470" y="368" width="430" height="86" rx="8" ry="8" fill="#451a03" stroke="#fdba74" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="685" y="398" fill="#ffedd5" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Governance layer</text>
    <text x="685" y="420" fill="#fed7aa" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Authorization � provenance � access � audit � tenant isolation</text>

    <!-- Data plane -->
    <rect x="0" y="492" width="920" height="116" rx="12" ry="12" fill="#422006" stroke="#d97757" stroke-width="2"/>
    <rect x="0" y="470" width="174" height="22" rx="4" ry="4" fill="#18181b"/>
    <text x="87" y="485" fill="#fcd34d" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.06em">DATA PLANE</text>
    <rect x="20" y="518" width="280" height="72" rx="8" ry="8" fill="#292524" stroke="#f59e6b" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="160" y="547" fill="#fef3c7" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Redis</text>
    <text x="160" y="570" fill="#fde68a" font-family="system-ui,sans-serif" font-size="10.8" text-anchor="middle">Working memory � sessions � recent context � ephemeral state</text>
    <rect x="320" y="518" width="280" height="72" rx="8" ry="8" fill="#292524" stroke="#f59e6b" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="460" y="547" fill="#fef3c7" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Vector DB � Weaviate / Chroma</text>
    <text x="460" y="570" fill="#fde68a" font-family="system-ui,sans-serif" font-size="10.8" text-anchor="middle">Embeddings � similarity � highdimensional recall</text>
    <rect x="620" y="518" width="280" height="72" rx="8" ry="8" fill="#292524" stroke="#f59e6b" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="760" y="547" fill="#fef3c7" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Neo4j � graph memory</text>
    <text x="760" y="570" fill="#fde68a" font-family="system-ui,sans-serif" font-size="10.8" text-anchor="middle">Entities &amp; relations � traversal � temporal structure</text>

    <!-- Execution -->
    <rect x="0" y="642" width="920" height="108" rx="12" ry="12" fill="#0c2744" stroke="#3b82f6" stroke-width="2"/>
    <rect x="0" y="620" width="210" height="22" rx="4" ry="4" fill="#18181b"/>
    <text x="105" y="635" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.06em">EXECUTION PLANE</text>
    <rect x="20" y="662" width="430" height="72" rx="8" ry="8" fill="#0f3560" stroke="#60a5fa" stroke-opacity="0.6" stroke-width="1.5"/>
    <text x="235" y="694" fill="#dbeafe" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Worker engine</text>
    <text x="235" y="715" fill="#bfdbfe" font-family="system-ui,sans-serif" font-size="10.8" text-anchor="middle">Reindex � summarize � embeddings � enrichment � cleanup � batch jobs</text>
    <rect x="470" y="662" width="430" height="72" rx="8" ry="8" fill="#0f3560" stroke="#60a5fa" stroke-opacity="0.6" stroke-width="1.5"/>
    <text x="685" y="694" fill="#dbeafe" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Temporal workflows</text>
    <text x="685" y="715" fill="#bfdbfe" font-family="system-ui,sans-serif" font-size="10.8" text-anchor="middle">Durable execution � scheduling � retries � longrunning tasks � events</text>

    <!-- Ops -->
    <rect x="0" y="784" width="920" height="96" rx="12" ry="12" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <rect x="0" y="762" width="214" height="22" rx="4" ry="4" fill="#18181b"/>
    <text x="107" y="777" fill="#a5f3fc" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.06em">OPERATIONS</text>
    <rect x="20" y="802" width="436" height="62" rx="8" ry="8" fill="#0c354a" stroke="#22d3ee" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="238" y="831" fill="#ccfbf1" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Prometheus + Grafana</text>
    <text x="238" y="852" fill="#a5f3fc" font-family="system-ui,sans-serif" font-size="10.8" text-anchor="middle">Metrics � dashboards � alerting</text>
    <rect x="466" y="802" width="434" height="62" rx="8" ry="8" fill="#0c354a" stroke="#22d3ee" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="683" y="831" fill="#ccfbf1" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Docker Compose � Kubernetes references</text>
    <text x="683" y="852" fill="#a5f3fc" font-family="system-ui,sans-serif" font-size="10.8" text-anchor="middle">Local stack � deployment manifests</text>
  </g>

  <!-- Flow arrows (absolute coords; outer group translates 40,94) -->
  <g stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="500" y1="186" x2="500" y2="212" stroke="#64748b" marker-end="url(#caret)"/>
    <line x1="500" y1="300" x2="500" y2="340" stroke="#64748b" marker-end="url(#caret)"/>
    <line x1="500" y1="558" x2="500" y2="586" stroke="#64748b" marker-end="url(#caret)"/>
    <line x1="500" y1="702" x2="500" y2="736" stroke="#64748b" marker-end="url(#caret)"/>
    <line x1="500" y1="844" x2="500" y2="878" stroke="#475569" stroke-dasharray="4 7" marker-end="url(#caretMuted)"/>
  </g>

  <!-- Foot -->
  <text x="500" y="1044" fill="#64748b" font-family="system-ui,sans-serif" font-size="11.5" text-anchor="middle">Reference topology for this repository - see docs/architecture/system-overview.md</text>
</svg>
