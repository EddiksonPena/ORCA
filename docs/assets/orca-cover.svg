<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 768" role="img" aria-labelledby="title desc">
  <title id="title">ORCA: Objective Relational Contextual Archive</title>
  <desc id="desc">A deep blue underwater data city with an orca, memory graph lines, and the ORCA project name.</desc>
  <defs>
    <radialGradient id="surface" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#bff7ff"/>
      <stop offset="18%" stop-color="#159bd3"/>
      <stop offset="48%" stop-color="#063c5f"/>
      <stop offset="100%" stop-color="#020814"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#7df9ff"/>
      <stop offset="50%" stop-color="#0ec9ff"/>
      <stop offset="100%" stop-color="#0075ff"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#050b14"/>
      <stop offset="60%" stop-color="#071a28"/>
      <stop offset="100%" stop-color="#01040a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

